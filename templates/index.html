<form action="/process-pdf" method="POST" enctype="multipart/form-data">
    <h2>Family Medicare Form</h2>
    பெயர்: <input type="text" name="proposer_name" required><br>
    தொகை: <select name="sum_insured">
        <option value="500000">5,00,000</option>
        <option value="1000000">10,00,000</option>
    </select><br>
    புகைப்படம்: <input type="file" name="client_photo"><br>
    கையொப்பம்: <input type="file" name="client_sign"><br>
    <button type="submit">Submit</button>
</form>
